apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-service
  labels:
    app: hello-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-service
  template:
    metadata:
      labels:
        app: hello-service
        version: v1
    spec:
      containers:
        - name: hello-service
          image: service-discovery:latest
          imagePullPolicy: Never
          command: ["python", "hello_service.py"]
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: SERVICE_NAME
              value: "hello-service"
            - name: REGISTRY_URL
              value: "http://service-registry:5001"
            - name: SERVICE_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hello-service
spec:
  selector:
    app: hello-service
  ports:
    - port: 80
      targetPort: 8001
  type: ClusterIP
